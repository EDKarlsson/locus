have_fun: false

memory_config:
  disabled: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 20
  pull_request_opened:
    help: false
    summary: true
    code_review: true
    include_drafts: true

ignore_patterns:
  # Lockfile — generated, not reviewed
  - "uv.lock"
  # Generated benchmark data and charts
  - "docs/bench/*.json"
  - "docs/img/*.svg"
  # Palace fixtures used only in tests
  - "tests/fixtures/**"
  # Example palace — template content, not production code
  - "example-palace/**"
  # Compiled / binary artefacts
  - "**/__pycache__/**"
  - "**/*.pyc"
  - ".venv/**"
