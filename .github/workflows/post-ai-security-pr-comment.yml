name: Post AI Security PR Comment

on:
  workflow_run:
    workflows: ["Claude Security Audit"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  post-security-comment:
    # Only runs when the upstream audit was dispatched with a pr_number input
    # and completed successfully.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.inputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download Claude audit artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/ai-audit
          gh api "repos/${REPO}/actions/runs/${RUN_ID}/artifacts" > /tmp/ai-audit/artifacts.json

          artifact_id="$(jq -r '.artifacts[] | select(.name=="claude-security-audit") | .id' /tmp/ai-audit/artifacts.json | head -n1)"
          if [ -z "${artifact_id}" ] || [ "${artifact_id}" = "null" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api "repos/${REPO}/actions/artifacts/${artifact_id}/zip" > /tmp/ai-audit/claude-security-audit.zip
          unzip -q /tmp/ai-audit/claude-security-audit.zip -d /tmp/ai-audit/unpacked

          comment_file="$(find /tmp/ai-audit/unpacked -maxdepth 1 -type f -name '*-security-pr-comment.md' | sort | head -n1)"
          if [ -z "${comment_file}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          printf 'comment_file=%s\n' "${comment_file}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.artifact.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.inputs.pr_number }}
          COMMENT_FILE: ${{ steps.artifact.outputs.comment_file }}
        run: |
          gh pr comment "${PR_NUMBER}" --body-file "${COMMENT_FILE}"

      - name: No comment file found
        if: steps.artifact.outputs.found != 'true'
        run: echo "No *-security-pr-comment.md file found in Claude audit artifact."
