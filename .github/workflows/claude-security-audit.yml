name: Claude Security Audit

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post security audit comment on (leave blank to skip)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate Claude API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "Missing required secret: ANTHROPIC_API_KEY"
            exit 1
          fi

      - name: Load Claude security prompt
        id: prompt
        run: |
          {
            echo "prompt<<CLAUDE_SECURITY_AUDIT_PROMPT_EOF"
            cat .github/prompts/claude-security-audit.md
            echo "CLAUDE_SECURITY_AUDIT_PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude security audit
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_permissions: "actions:read"

      - name: Upload Claude audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-security-audit
          path: |
            docs/audits/claude-security-pr-review-report.md
            docs/audits/claude-security-pr-comment.md
            docs/audits/artifacts/claude-bandit.json
            docs/audits/artifacts/claude-pip-audit.txt
          if-no-files-found: ignore
          retention-days: 14
