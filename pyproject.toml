[project]
name = "locus-agent"
version = "0.2.0"
description = "Hierarchical markdown memory system for autonomous AI agents"
requires-python = ">=3.11"
dependencies = [
    "claude-agent-sdk>=0.0.14",
    "anyio>=4.0",
]

[project.scripts]
locus = "locus.agent.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["locus"]
